<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Руководство по оформлению цифрового контента</title>
  <link rel="stylesheet" href="hero.css">
</head>
<body>
  <div id="allrecords" class="site-page">
    <main class="hero" id="home" aria-label="Первый экран">
      <nav class="hero__nav" aria-label="Навигация">
        <ul class="hero__ticks snap" style="--y: 8;">
          <li>
            <a class="hero__nav-dot is-active" href="#home" aria-current="page">
              <span class="hero__tooltip">Главная</span>
            </a>
          </li>
          <li>
            <a class="hero__nav-dot" href="#strategy">
              <span class="hero__tooltip">Стратегия</span>
            </a>
          </li>
          <li>
            <a class="hero__nav-dot" href="visual.html">
              <span class="hero__tooltip">Визуальный блок</span>
            </a>
          </li>
          <li>
            <a class="hero__nav-dot" href="#channels">
              <span class="hero__tooltip">Каналы</span>
            </a>
          </li>
          <li>
            <a class="hero__nav-dot" href="#processes">
              <span class="hero__tooltip">Процессы</span>
            </a>
          </li>
          <li>
            <a class="hero__nav-dot" href="#materials">
              <span class="hero__tooltip">Материалы</span>
            </a>
          </li>
        </ul>
      </nav>

      <section class="hero__work" aria-label="Рабочая зона">
        <h1 class="hero__title snap" style="--x: 0; --y: 3;">Руководство<br>по оформлению<br>цифрового<br>контента</h1>

        <p class="hero__lead snap snap-bottom" style="--x: 0; --y: 16;">Lorem ipsum dolor sit amet consectetur.<br>Curabitur lectus at in ac tristique blandit sed.</p>

        <div class="hero__button-row snap" style="--x: 0; --y: 19;">
          <button class="hero__button hero__button--primary" type="button">Кнопка <span class="hero__button-arrow" aria-hidden="true"></span></button>
          <button class="hero__button" type="button">Кнопка</button>
        </div>

        <label class="hero__search snap" style="--x: 0; --y: 23;">
          <img class="hero__search-icon" src="heropage/img/sertch.svg" alt="" aria-hidden="true">
          <input type="search" placeholder="Найдите раздел, канал, шаблон, шрифт">
        </label>
      </section>

      <div class="hero__photos" aria-hidden="true">
        <img class="hero__photo hero__photo--one" src="heropage/img/1.png" alt="">
        <img class="hero__photo hero__photo--two" src="heropage/img/2.png" alt="">
        <img class="hero__photo hero__photo--three" src="heropage/img/3.png" alt="">
        <img class="hero__photo hero__photo--four" src="heropage/img/4.png" alt="">
      </div>
    </main>

  </div>

  <div class="page-transition" id="page-transition" aria-hidden="true">
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <div class="page-transition__panel"></div>
    <span class="page-transition__label">УниВенд</span>
  </div>

  <script>
    (function () {
      const overlay = document.getElementById('page-transition');
      if (!overlay) return;

      function navigateWith(href) {
        try { sessionStorage.setItem('univend:page-transition', '1'); } catch (e) {}
        overlay.classList.add('is-covering');
        setTimeout(function () { window.location.href = href; }, 750);
      }

      document.querySelectorAll('a[href]').forEach(function (a) {
        const href = a.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
        if (a.target && a.target !== '' && a.target !== '_self') return;
        try {
          const url = new URL(href, window.location.href);
          if (url.origin !== window.location.origin) return;
          if (url.pathname === window.location.pathname) return;
        } catch (e) { return; }

        a.addEventListener('click', function (e) {
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
          e.preventDefault();
          navigateWith(href);
        });
      });

      let revealed = false;
      try {
        if (sessionStorage.getItem('univend:page-transition')) {
          sessionStorage.removeItem('univend:page-transition');
          overlay.classList.add('no-anim', 'is-covering');
          requestAnimationFrame(function () {
            overlay.offsetHeight;
            overlay.classList.remove('no-anim');
            requestAnimationFrame(function () {
              overlay.classList.remove('is-covering');
              overlay.classList.add('is-revealing');
              revealed = true;
              setTimeout(function () {
                overlay.classList.remove('is-revealing');
              }, 1100);
            });
          });
        }
      } catch (e) {}

      window.addEventListener('pageshow', function (e) {
        if (e.persisted && !revealed) {
          overlay.classList.remove('is-covering', 'is-revealing');
        }
      });
    })();
  </script>

  <script>
    (function () {
      let grid = document.getElementById('grid-32-underlay');

      if (!grid) {
        grid = document.createElement('div');
        grid.id = 'grid-32-underlay';
        document.body.insertBefore(grid, document.body.firstChild);
      }

      function updateGridHeight() {
        const allRecords = document.getElementById('allrecords');
        const contentBottom = allRecords
          ? allRecords.getBoundingClientRect().bottom + window.pageYOffset
          : document.documentElement.clientHeight;

        const fullHeight = Math.max(
          contentBottom,
          window.innerHeight
        );

        const nextHeight = Math.ceil(fullHeight) + 'px';

        if (grid.style.height !== nextHeight) {
          grid.style.height = nextHeight;
        }
      }

      function updateGrid() {
        document.body.style.setProperty('padding-top', '0', 'important');
        document.body.style.setProperty('overflow-x', 'hidden', 'important');
        grid.style.setProperty('display', 'block', 'important');
        updateGridHeight();
      }

      window.addEventListener('load', updateGrid);
      window.addEventListener('resize', updateGrid);

      setTimeout(updateGrid, 200);
      setTimeout(updateGrid, 800);
      setTimeout(updateGrid, 1500);
      setTimeout(updateGrid, 3000);

      const observer = new MutationObserver(function (mutations) {
        const shouldUpdate = mutations.some(function (mutation) {
          return mutation.target !== grid;
        });

        if (shouldUpdate) {
          updateGrid();
        }
      });

      observer.observe(document.body, {
        attributes: true,
        attributeFilter: ['class', 'style'],
        childList: true,
        subtree: true
      });
    })();
  </script>
</body>
</html>
